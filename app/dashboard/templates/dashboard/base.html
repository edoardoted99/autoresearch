<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}autoresearch{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; background: #0d1117; color: #c9d1d9; }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        h1, h2, h3 { color: #f0f6fc; margin-bottom: 16px; }
        h1 { font-size: 1.5em; border-bottom: 1px solid #21262d; padding-bottom: 12px; }

        /* Navbar */
        .navbar { background: #161b22; border-bottom: 1px solid #21262d; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 48px; }
        .navbar-left { display: flex; align-items: center; gap: 16px; }
        .navbar-brand { color: #f0f6fc; font-weight: 700; font-size: 1em; }
        .navbar-brand:hover { text-decoration: none; }
        .navbar-links { display: flex; gap: 4px; }
        .navbar-links a { color: #8b949e; padding: 6px 12px; border-radius: 6px; font-size: 0.85em; }
        .navbar-links a:hover { background: #21262d; color: #c9d1d9; text-decoration: none; }
        .navbar-links a.active { color: #f0f6fc; background: #21262d; }
        .navbar-right { display: flex; align-items: center; gap: 16px; }

        /* Experiment status (navbar) */
        .exp-status { display: none; align-items: center; gap: 8px; background: #1f6feb18; border: 1px solid #1f6feb44; border-radius: 6px; padding: 4px 12px; font-size: 0.8em; }
        .exp-status.active { display: flex; }
        .exp-status .exp-dot { width: 8px; height: 8px; border-radius: 50%; background: #1f6feb; animation: pulse 1.5s infinite; }
        .exp-status .exp-name { color: #58a6ff; font-weight: 600; }
        .exp-status .exp-bar { width: 100px; height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; }
        .exp-status .exp-bar-fill { height: 100%; border-radius: 3px; background: #1f6feb; transition: width 1s linear; }
        .exp-status .exp-time { color: #8b949e; font-family: monospace; }

        /* Auto-refresh */
        .auto-refresh { display: flex; align-items: center; gap: 6px; font-size: 0.8em; color: #8b949e; }
        .auto-refresh button { background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 0.8em; }
        .auto-refresh button.active { background: #238636; border-color: #238636; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* GPU status bar */
        .gpu-bar-top { background: #0d1117; border-bottom: 1px solid #21262d; padding: 0 24px; display: flex; align-items: center; height: 28px; gap: 16px; font-size: 0.72em; color: #6e7681; overflow-x: auto; }
        .gpu-bar-top a { color: #6e7681; }
        .gpu-bar-top a:hover { color: #c9d1d9; text-decoration: none; }
        .gpu-chip { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
        .gpu-chip .gpu-pct { color: #c9d1d9; font-family: monospace; font-weight: 600; min-width: 28px; text-align: right; }
        .gpu-chip .gpu-bar-mini { width: 40px; height: 4px; background: #21262d; border-radius: 2px; overflow: hidden; display: inline-block; }
        .gpu-chip .gpu-bar-mini-fill { display: block; height: 100%; border-radius: 2px; }

        /* Breadcrumb */
        .breadcrumb { padding: 10px 24px; font-size: 0.85em; color: #8b949e; border-bottom: 1px solid #21262d; background: #0d1117; }
        .breadcrumb a { color: #58a6ff; }
        .breadcrumb .sep { margin: 0 4px; color: #484f58; }

        /* Content */
        .content { padding: 24px; max-width: 1200px; margin: 0 auto; }
        table { width: 100%; border-collapse: collapse; margin: 16px 0; }
        th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid #21262d; }
        th { color: #8b949e; font-weight: 600; font-size: 0.85em; text-transform: uppercase; }
        tr:hover { background: #161b22; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; font-weight: 600; }
        .badge-keep { background: #238636; color: #fff; }
        .badge-discard { background: #6e7681; color: #fff; }
        .badge-crash { background: #da3633; color: #fff; }
        .badge-running { background: #1f6feb; color: #fff; animation: pulse 1.5s infinite; }
        .metric { font-family: monospace; font-weight: 600; }
        .metric-good { color: #3fb950; }
        .card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 16px; margin: 12px 0; }
        .diff { background: #161b22; border: 1px solid #21262d; border-radius: 6px; padding: 12px; overflow-x: auto; font-family: monospace; font-size: 0.85em; white-space: pre-wrap; line-height: 1.5; }
        .diff-add { color: #3fb950; }
        .diff-del { color: #f85149; }
        .diff-hunk { color: #8b949e; }
        .chart-container { height: 300px; margin: 16px 0; }
        .empty { color: #8b949e; padding: 40px; text-align: center; }
        .tag { display: inline-block; background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb44; padding: 1px 6px; border-radius: 4px; font-size: 0.8em; }
        .btn { display: inline-block; background: #21262d; border: 1px solid #30363d; color: #c9d1d9; padding: 5px 14px; border-radius: 6px; font-size: 0.85em; cursor: pointer; }
        .btn:hover { background: #30363d; text-decoration: none; }
        .btn-primary { background: #238636; border-color: #238636; color: #fff; }
        .btn-primary:hover { background: #2ea043; }
        .btn-sm { padding: 2px 8px; font-size: 0.8em; }
        .config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; font-size: 0.9em; }
        .config-grid dt { color: #8b949e; }
        .config-grid dd { color: #c9d1d9; font-family: monospace; }
        .gpu-bar { height: 20px; background: #21262d; border-radius: 4px; overflow: hidden; margin: 4px 0; }
        .gpu-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .gpu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 12px; }
        /* Stats row */
        .stats-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .stat-card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 12px 16px; flex: 1; min-width: 140px; }
        .stat-card .stat-label { color: #8b949e; font-size: 0.75em; text-transform: uppercase; margin-bottom: 4px; }
        .stat-card .stat-value { color: #f0f6fc; font-family: monospace; font-size: 1.3em; font-weight: 700; }
        .stat-card .stat-value.good { color: #3fb950; }
        .stat-card .stat-value.running { color: #1f6feb; }
        /* Forms */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #c9d1d9; font-size: 0.85em; margin-bottom: 4px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9;
            padding: 8px 12px; border-radius: 6px; font-family: monospace; font-size: 0.9em;
        }
        .form-group textarea { min-height: 400px; resize: vertical; }
        .form-group .helptext { color: #8b949e; font-size: 0.8em; margin-top: 2px; }
        /* Markdown rendered content */
        .markdown-body { font-size: 0.9em; line-height: 1.6; max-height: 500px; overflow-y: auto; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin-top: 16px; margin-bottom: 8px; border-bottom: 1px solid #21262d; padding-bottom: 4px; }
        .markdown-body h1 { font-size: 1.4em; }
        .markdown-body h2 { font-size: 1.2em; }
        .markdown-body h3 { font-size: 1em; border: none; }
        .markdown-body p { margin: 8px 0; }
        .markdown-body ul, .markdown-body ol { margin: 8px 0; padding-left: 24px; }
        .markdown-body li { margin: 4px 0; }
        .markdown-body code { background: #0d1117; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; color: #f0883e; }
        .markdown-body pre { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 12px; overflow-x: auto; margin: 8px 0; }
        .markdown-body pre code { background: none; padding: 0; color: #c9d1d9; }
        .markdown-body strong { color: #f0f6fc; }
        .markdown-body blockquote { border-left: 3px solid #30363d; padding-left: 12px; color: #8b949e; margin: 8px 0; }
        /* Collapsible */
        details summary { cursor: pointer; color: #8b949e; font-size: 0.85em; padding: 8px 0; }
        details summary:hover { color: #c9d1d9; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar">
        <div class="navbar-left">
            <a href="{% url 'dashboard:index' %}" class="navbar-brand">autoresearch</a>
            <div class="navbar-links">
                <a href="{% url 'dashboard:index' %}" {% block nav_programs %}{% endblock %}>Programs</a>
                <a href="{% url 'dashboard:gpu_stats' %}" {% block nav_gpu %}{% endblock %}>GPU</a>
            </div>
        </div>
        <div class="navbar-right">
            <div class="exp-status" id="experimentStatus"></div>
            <div class="auto-refresh">
                <button id="refreshBtn" onclick="toggleRefresh()">10s</button>
            </div>
        </div>
    </nav>
    <div class="gpu-bar-top" id="gpuBarTop">
        <span>GPU loading...</span>
    </div>
    {% block breadcrumb_bar %}{% endblock %}
    <div class="content">
        {% block content %}{% endblock %}
    </div>
    <script>
    // Auto-refresh
    let refreshInterval = null;
    const RS = 10;
    function isOn() { return localStorage.getItem('autoRefresh') === 'on'; }
    function toggleRefresh() { localStorage.setItem('autoRefresh', isOn() ? 'off' : 'on'); applyRefresh(); }
    function applyRefresh() {
        const on = isOn();
        const btn = document.getElementById('refreshBtn');
        btn.classList.toggle('active', on);
        btn.textContent = on ? RS + 's' : 'off';
        clearInterval(refreshInterval);
        if (on) refreshInterval = setInterval(() => location.reload(), RS * 1000);
    }
    applyRefresh();

    // GPU status bar
    function gpuColor(pct) {
        if (pct > 90) return '#da3633';
        if (pct > 70) return '#d29922';
        return '#3fb950';
    }
    async function fetchGpuBar() {
        try {
            const r = await fetch('{% url "dashboard:gpu_stats_api" %}');
            const d = await r.json();
            const bar = document.getElementById('gpuBarTop');
            if (d.error) { bar.innerHTML = `<span>${d.error}</span>`; return; }
            const gpus = d.gpus || [];
            if (!gpus.length) { bar.innerHTML = '<span>No GPU</span>'; return; }
            bar.innerHTML = gpus.map(g => {
                const memPct = g.mem_total > 0 ? (g.mem_used / g.mem_total * 100) : 0;
                return `<a href="{% url 'dashboard:gpu_stats' %}" class="gpu-chip">` +
                    `<span>GPU${g.index}</span>` +
                    `<span class="gpu-pct">${g.gpu_util.toFixed(0)}%</span>` +
                    `<span class="gpu-bar-mini"><span class="gpu-bar-mini-fill" style="width:${g.gpu_util}%;background:${gpuColor(g.gpu_util)}"></span></span>` +
                    `</a>` +
                    `<span class="gpu-chip">` +
                    `<span>MEM</span>` +
                    `<span class="gpu-pct">${(g.mem_used/1024).toFixed(1)}G</span>` +
                    `<span class="gpu-bar-mini"><span class="gpu-bar-mini-fill" style="width:${memPct}%;background:${gpuColor(memPct)}"></span></span>` +
                    `</span>` +
                    `<span class="gpu-chip"><span>${g.temperature.toFixed(0)}C</span></span>` +
                    `<span class="gpu-chip"><span>${g.power_draw.toFixed(0)}W</span></span>`;
            }).join('<span style="color:#21262d;margin:0 2px">|</span>');
        } catch(e) {
            document.getElementById('gpuBarTop').innerHTML = '<span>GPU unavailable</span>';
        }
    }
    fetchGpuBar();
    setInterval(fetchGpuBar, 3000);

    // Experiment status
    async function fetchExpStatus() {
        const el = document.getElementById('experimentStatus');
        try {
            const r = await fetch('{% url "dashboard:experiment_status_api" %}');
            const d = await r.json();
            const exps = d.experiments || [];
            if (!exps.length) { el.classList.remove('active'); return; }
            el.classList.add('active');
            el.innerHTML = exps.map(e => {
                const rem = Math.max(0, e.time_budget - e.elapsed);
                return `<span class="exp-dot"></span>` +
                    `<span class="exp-name">${e.program}</span>` +
                    `<span class="exp-bar"><span class="exp-bar-fill" style="width:${e.progress}%"></span></span>` +
                    `<span class="exp-time">${Math.round(rem)}s</span>`;
            }).join('');
        } catch(e) { el.classList.remove('active'); }
    }
    fetchExpStatus();
    setInterval(fetchExpStatus, 2000);
    </script>
</body>
</html>
